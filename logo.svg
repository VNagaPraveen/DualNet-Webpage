<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200">
  <!-- Left boxes grid -->
  <rect x="10" y="20" width="50" height="50" fill="#555555" rx="8"/>
  <rect x="70" y="20" width="50" height="50" fill="#555555" rx="8"/>
  <rect x="10" y="80" width="50" height="50" fill="#555555" rx="8"/>
  <rect x="70" y="80" width="50" height="50" fill="#555555" rx="8"/>
  
  <!-- Inner white squares -->
  <rect x="20" y="30" width="30" height="30" fill="white" rx="4"/>
  <rect x="80" y="30" width="30" height="30" fill="white" rx="4"/>
  <rect x="20" y="90" width="30" height="30" fill="white" rx="4"/>
  <rect x="80" y="90" width="30" height="30" fill="white" rx="4"/>
  
  <!-- Yellow arrow -->
  <polygon points="130,55 180,35 185,60 220,60 200,75 210,100 185,85 170,95 130,75" fill="#FFD700"/>
  
  <!-- Text: Dual -->
  <text x="240" y="110" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#555555">Dual</text>
  
  <!-- Text: Net (in yellow) -->
  <text x="540" y="110" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FFD700">Net</text>
</svg>