<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260">
  <!-- Background -->
  <rect width="700" height="260" fill="transparent"/>
  
  <!-- Grid squares (2x2) -->
  <!-- Top left square -->
  <rect x="10" y="15" width="75" height="75" rx="12" fill="#4a4a4a"/>
  <rect x="22" y="27" width="51" height="51" fill="white"/>
  
  <!-- Top right square -->
  <rect x="105" y="15" width="75" height="75" rx="12" fill="#4a4a4a"/>
  <rect x="117" y="27" width="51" height="51" fill="white"/>
  
  <!-- Bottom left square -->
  <rect x="10" y="110" width="75" height="75" rx="12" fill="#4a4a4a"/>
  <rect x="22" y="122" width="51" height="51" fill="white"/>
  
  <!-- Bottom right square -->
  <rect x="105" y="110" width="75" height="75" rx="12" fill="#4a4a4a"/>
  <rect x="117" y="122" width="51" height="51" fill="white"/>
  
  <!-- Arrow -->
  <path d="M 210 70 L 280 70 L 265 55 M 280 70 L 265 85" stroke="#FFC000" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text: DualNet -->
  <!-- "Dual" in dark grey -->
  <text x="310" y="130" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="#4a4a4a">Dual</text>
  
  <!-- "Net" in yellow -->
  <text x="580" y="130" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="#FFC000">Net</text>
</svg>